# seccomp_policy_file = "/path/to/policy.kafel"

# --- Default command (overridden by CLI args after --) ---

[run]
path = "/bin/sh"
args = ["-i"]
# argv0 = "/bin/custom-shell"  # Override argv[0] for this command
